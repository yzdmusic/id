<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="styleAlbum.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
	<title>Proyeksi Bunuh Diri Album</title>
</head>
<body>
    <div class="thumbnail-genre2nd proyeksi-bunuh-diri">
        <h1>Proyeksi Bunuh Diri</h1>
        <a href="home.html"><img src="back-button2.png" alt=""></a>
        <p>Album • 2025</p>
    </div>

    <div class="home-content">
        <div class="song-card" data-index="0" data-title="20th Floor" data-artist="Kehedsia" data-src="https://yzdmusic.github.io/assets-music-5/Kehedsia - 20th Floor.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/PROYEKSI BUNUH DIRI (COVER).jpg">
            <div class="card-title">
                <h1>20th Floor</h1>
                <p>Kehedsia</p>
            </div>
            <span></span>
        </div>

        <div class="song-card" data-index="1" data-title="All The Dreams Lost" data-artist="Kehedsia" data-src="https://yzdmusic.github.io/assets-music-5/Kehedsia - All The Dreams Lost.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/PROYEKSI BUNUH DIRI (COVER).jpg">
            <div class="card-title">
                <h1>All The Dreams Lost</h1>
                <p>Kehedsia</p>
            </div>
            <span></span>
        </div>

        <div class="song-card" data-index="2" data-title="No Purpose Left" data-artist="Kehedsia" data-src="https://yzdmusic.github.io/assets-music-5/Kehedsia - No Purpose Left.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/PROYEKSI BUNUH DIRI (COVER).jpg">
            <div class="card-title">
                <h1>No Purpose Left</h1>
                <p>Kehedsia</p>
            </div>
            <span></span>
        </div>

        <div class="song-card" data-index="3" data-title="Song Of Death" data-artist="Kehedsia" data-src="https://yzdmusic.github.io/assets-music-5/Kehedsia - Song Of Death.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/PROYEKSI BUNUH DIRI (COVER).jpg">
            <div class="card-title">
                <h1>Song Of Death</h1>
                <p>Kehedsia</p>
            </div>
            <span></span>
        </div>
    </div>

    <!-- Sliding Music Player UI -->
    <div class="music-player-ui" id="musicPlayerUI" style="background: linear-gradient(rgb(31, 11, 146), rgb(0, 0, 0));">
        <div class="music-header">
            <img id="closePlayer" class="back-btn" src="arrow-down.png" alt="">
            <div class="title-music-player">
                <span>PLAYING ALBUM</span>
                <span class="album">Proyeksi Bunuh Diri</span>
            </div>
            <img class="more-options" src="more.png" alt="">
        </div>
        <img src="cover1.jpg" alt="Album Cover" class="album-cover-large" id="albumCoverLarge">
        <div class="song-info-large">
            <h2 id="songTitleLarge">Green Utopia</h2>
            <p id="artistNameLarge">The Vines</p>
        </div>
        <div class="progress-bar-container">
            <input type="range" id="progressLarge" value="0" max="100">
            <div class="timeandduration-container">
                <span id="currentTimeLarge">0:00</span>
                <span id="durationLarge">0:00</span>
            </div>
        </div>
        <div class="controls-large">
            <img id="shuffleLarge" class="control-btn-large" src="arrow.png" alt="Shuffle">
            <img id="prevLarge" class="control-btn-large" src="back-button.png" alt="Previous">
            <img id="playPauseLarge" class="control-btn-large" src="play.png" alt="Play/Pause">
            <img id="nextLarge" class="control-btn-large" src="next-button.png" alt="Next">
            <img id="repeatLarge" class="control-btn-large" src="repeat.png" alt="Repeat">
        </div>
        <div class="credits-container">
            <h1 class="credits">Credits</h1>
            <div class="card-title-credits">
                <a href="profile-kehedsia.html" target="_blank">
                    <h1>Kehedsia</h1>
                </a>
                <p>Artist</p>
            </div>
        </div>
    </div>

    <audio id="audio" src=""></audio>

    <!-- Notification Player -->
    <div id="notificationPlayer" style="background: linear-gradient(rgb(31, 11, 146), rgb(31, 11, 146));">
        <img id="notificationAlbumCover" src="cover_album.jpg" alt="Album Cover">
        <div id="notificationDetails">
            <span id="notificationTitle">Judul Lagu</span> <!-- Judul Lagu -->
        </div>
        <button id="playPauseNotificationBtn">
            <img id="playPauseImg" src="play.png" alt="Play/Pause">
        </button>
    </div>

    <div class="bottom-nav">
        <a href="home.html">
            <div class="nav-item">
                <img src="home.png" alt="Home Icon" class="nav-icon">
                <p>Home</p>
            </div>
        </a>
        
        <a href="search.html">
            <div class="nav-item active">
                <img src="search.png" alt="Search Icon" class="nav-icon">
                <p>Search</p>
            </div>
        </a>
        
        <a href="library.html">
            <div class="nav-item">
                <img src="playlist.png" alt="Library Icon" class="nav-icon">
                <p>Library</p>
            </div>
        </a>
    </div>

	<!-- Add here -->
	<link
		rel="Shortcut Icon"
		type="image/png"
		href="YZD LOGO.png"
	>

    <script src="play-music.js"></script>
</body>
</html>
