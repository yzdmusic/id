<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="styleAlbum.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
	<title>Rowdiest Album</title>
</head>
<body>
    <div class="thumbnail-genre rowdiest">
        <h1>Rowdiest</h1>
        <a href="home.html"><img src="back-button2.png" alt=""></a>
        <p>Album</p>
    </div>

    <div class="home-content">
        <div class="song-card" data-index="0" data-title="Rowdiest" data-artist="The Rowdy" data-src="https://yzdmusic.github.io/assets-music-2/Rowdiest.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ROWDIEST (COVER).jpg">
            <div class="card-title">
                <h1>Rowdiest</h1>
                <p>The Rowdy</p>
            </div>
        </div>

        <div class="song-card" data-index="1" data-title="Ska Today" data-artist="The Rowdy" data-src="https://yzdmusic.github.io/assets-music-2/Ska Today.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ROWDIEST (COVER).jpg">
            <div class="card-title">
                <h1>Ska Today</h1>
                <p>The Rowdy</p>
            </div>
        </div>

        <div class="song-card" data-index="2" data-title="Hard Life In Jakarta" data-artist="The Rowdy" data-src="https://yzdmusic.github.io/assets-music-2/Hard Life in Jakarta.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ROWDIEST (COVER).jpg">
            <div class="card-title">
                <h1>Hard Life In Jakarta</h1>
                <p>The Rowdy</p>
            </div>
        </div>

        <div class="song-card" data-index="3" data-title="Roar Of Kemayoran" data-artist="The Rowdy" data-src="https://yzdmusic.github.io/assets-music-2/Roar of Kemayoran.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ROWDIEST (COVER).jpg">
            <div class="card-title">
                <h1>Roar Of Kemayoran</h1>
                <p>The Rowdy</p>
            </div>
        </div>
    </div>

    <!-- Sliding Music Player UI -->
    <div class="music-player-ui" id="musicPlayerUI" style="background: linear-gradient(rgb(28, 21, 153), rgb(0, 0, 0));">
        <span class="title-music-player">PLAYING ALBUM</span>
        <span class="title-music-player album">Rowdiest</span>
        <div class="music-header">
            <img id="closePlayer" class="back-btn" src="back-button2.png" alt="Back">
            <span class="more-options">⋮</span>
        </div>
        <img src="cover1.jpg" alt="Album Cover" class="album-cover-large" id="albumCoverLarge">
        <div class="song-info-large">
            <h2 id="songTitleLarge">Green Utopia</h2>
            <p id="artistNameLarge">The Vines</p>
        </div>
        <div class="progress-bar-container">
            <span id="currentTimeLarge">0:00</span>
            <input type="range" id="progressLarge" value="0" max="100">
            <span id="durationLarge">0:00</span>
        </div>
        <div class="controls-large">
            <img id="shuffleLarge" class="control-btn-large" src="arrow.png" alt="Shuffle">
            <img id="prevLarge" class="control-btn-large" src="back-button.png" alt="Previous">
            <img id="playPauseLarge" class="control-btn-large" src="play.png" alt="Play/Pause">
            <img id="nextLarge" class="control-btn-large" src="next-button.png" alt="Next">
            <img id="repeatLarge" class="control-btn-large" src="repeat.png" alt="Repeat">
        </div>
    </div>

    <audio id="audio" src=""></audio>

    <div class="bottom-nav">
        <a href="home.html">
            <div class="nav-item">
                <img src="home.png" alt="Home Icon" class="nav-icon">
                <p>Home</p>
            </div>
        </a>
        
        <a href="search.html">
            <div class="nav-item active">
                <img src="search.png" alt="Search Icon" class="nav-icon">
                <p>Search</p>
            </div>
        </a>
        
        <div class="nav-item">
            <img src="playlist.png" alt="Library Icon" class="nav-icon">
            <p>Library</p>
        </div>
    </div>

	<!-- Add here -->
	<link
		rel="Shortcut Icon"
		type="image/png"
		href="YZD LOGO.png"
	>

	<script src="hamburger.js"></script>
    <script src="play-music.js"></script>
</body>
</html>
