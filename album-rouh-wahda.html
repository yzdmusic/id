<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="styleAlbum.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
	<title>Rouh Wahda Album</title>
</head>
<body>
    <div class="thumbnail-genre2nd rouh-wahda">
        <h1>Rouh Wahda</h1>
        <a href="home.html"><img src="back-button2.png" alt=""></a>
        <p>Album • 2022</p>
    </div>

    <div class="home-content">
        <div class="song-card" data-index="0" data-title="ريح الحنين" data-artist="The Dazzle" data-src="https://yzdmusic.github.io/assets-music-5/The Dazzle - ريح الحنين.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ROUH WAHDA (COVER).jpg">
            <div class="card-title">
                <h1>ريح الحنين</h1>
                <p>The Dazzle</p>
            </div>
            <span></span>
        </div>

        <div class="song-card" data-index="1" data-title="المرأة العربية" data-artist="The Dazzle" data-src="https://yzdmusic.github.io/assets-music-5/The Dazzle - المرأة العربية.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ROUH WAHDA (COVER).jpg">
            <div class="card-title">
                <h1>المرأة العربية</h1>
                <p>The Dazzle</p>
            </div>
            <span></span>
        </div>

        <div class="song-card" data-index="2" data-title="صباح الخير" data-artist="The Dazzle" data-src="https://yzdmusic.github.io/assets-music-5/The Dazzle - صباح الخير.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ROUH WAHDA (COVER).jpg">
            <div class="card-title">
                <h1>صباح الخير</h1>
                <p>The Dazzle</p>
            </div>
            <span></span>
        </div>

        <div class="song-card" data-index="3" data-title="نرقص سوا" data-artist="The Dazzle" data-src="https://yzdmusic.github.io/assets-music-5/The Dazzle - نرقص سوا.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ROUH WAHDA (COVER).jpg">
            <div class="card-title">
                <h1>نرقص سوا</h1>
                <p>The Dazzle</p>
            </div>
            <span></span>
        </div>
    </div>

    <!-- Sliding Music Player UI -->
    <div class="music-player-ui" id="musicPlayerUI" style="background: linear-gradient(rgb(246, 118, 20), rgb(0, 0, 0));">
        <div class="music-header">
            <img id="closePlayer" class="back-btn" src="arrow-down.png" alt="">
            <div class="title-music-player">
                <span>PLAYING ALBUM</span>
                <span class="album">Rouh Wahda</span>
            </div>
            <img class="more-options" src="more.png" alt="">
        </div>
        <img src="cover1.jpg" alt="Album Cover" class="album-cover-large" id="albumCoverLarge">
        <div class="song-info-large">
            <h2 id="songTitleLarge">Green Utopia</h2>
            <p id="artistNameLarge">The Vines</p>
        </div>
        <div class="progress-bar-container">
            <input type="range" id="progressLarge" value="0" max="100">
            <div class="timeandduration-container">
                <span id="currentTimeLarge">0:00</span>
                <span id="durationLarge">0:00</span>
            </div>
        </div>
        <div class="controls-large">
            <img id="shuffleLarge" class="control-btn-large" src="arrow.png" alt="Shuffle">
            <img id="prevLarge" class="control-btn-large" src="back-button.png" alt="Previous">
            <img id="playPauseLarge" class="control-btn-large" src="play.png" alt="Play/Pause">
            <img id="nextLarge" class="control-btn-large" src="next-button.png" alt="Next">
            <img id="repeatLarge" class="control-btn-large" src="repeat.png" alt="Repeat">
        </div>
        <div class="credits-container">
            <h1 class="credits">Credits</h1>
            <div class="card-title-credits">
                <a href="profile-the-dazzle.html" target="_blank">
                    <h1>The Dazzle</h1>
                </a>
                <p>Artist</p>
            </div>
        </div>
    </div>

    <audio id="audio" src=""></audio>

    <!-- Notification Player -->
    <div id="notificationPlayer" style="background: linear-gradient(rgb(246, 118, 20), rgb(246, 118, 20));">
        <img id="notificationAlbumCover" src="cover_album.jpg" alt="Album Cover">
        <div id="notificationDetails">
            <span id="notificationTitle">Judul Lagu</span> <!-- Judul Lagu -->
        </div>
        <button id="playPauseNotificationBtn">
            <img id="playPauseImg" src="play.png" alt="Play/Pause">
        </button>
    </div>

    <div class="bottom-nav">
        <a href="home.html">
            <div class="nav-item">
                <img src="home.png" alt="Home Icon" class="nav-icon">
                <p>Home</p>
            </div>
        </a>
        
        <a href="search.html">
            <div class="nav-item active">
                <img src="search.png" alt="Search Icon" class="nav-icon">
                <p>Search</p>
            </div>
        </a>
        
        <a href="library.html">
            <div class="nav-item">
                <img src="playlist.png" alt="Library Icon" class="nav-icon">
                <p>Library</p>
            </div>
        </a>
    </div>

	<!-- Add here -->
	<link
		rel="Shortcut Icon"
		type="image/png"
		href="YZD LOGO.png"
	>

    <script src="play-music.js"></script>
</body>
</html>
