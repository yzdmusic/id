<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="styleAlbum.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
	<title>Asap Dan Angin Album</title>
</head>
<body>
    <div class="thumbnail-genre asap-dan-angin">
        <h1>Asap Dan Angin</h1>
        <a href="home.html"><img src="back-button2.png" alt=""></a>
        <p>Album</p>
    </div>

    <div class="home-content">
        <div class="song-card" data-index="0" data-title="Asap Dan Angin" data-artist="Asap Dan Angin Album" data-src="https://yzdmusic.github.io/assets-music-1/Asap Dan Angin.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ASAP DAN ANGIN (COVER).jpg">
            <div class="card-title">
                <h1>Asap Dan Angin</h1>
                <p>Asap Dan Angin Album</p>
            </div>
        </div>

        <div class="song-card" data-index="1" data-title="Cinta Rasa Irama" data-artist="Asap Dan Angin Album" data-src="https://yzdmusic.github.io/assets-music-1/Cinta Rasa Irama.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ASAP DAN ANGIN (COVER).jpg">
            <div class="card-title">
                <h1>Cinta Rasa Irama</h1>
                <p>Asap Dan Angin Album</p>
            </div>
        </div>

        <div class="song-card" data-index="2" data-title="Bangun, Jang!" data-artist="Asap Dan Angin Album" data-src="https://yzdmusic.github.io/assets-music-1/Bangun, Jang!.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ASAP DAN ANGIN (COVER).jpg">
            <div class="card-title">
                <h1>Bangun, Jang!</h1>
                <p>Asap Dan Angin Album</p>
            </div>
        </div>

        <div class="song-card" data-index="3" data-title="Balik Ka Jaman Baheula" data-artist="Asap Dan Angin Album" data-src="https://yzdmusic.github.io/assets-music-1/Balik Ka Jaman Baheula.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ASAP DAN ANGIN (COVER).jpg">
            <div class="card-title">
                <h1>Balik Ka Jaman Baheula</h1>
                <p>Asap Dan Angin Album</p>
            </div>
        </div>

        <div class="song-card" data-index="4" data-title="Bayangmu Di Angin Senja" data-artist="Asap Dan Angin Album" data-src="https://yzdmusic.github.io/assets-music-1/Bayangmu Di Angin Senja.mp3"
            data-cover="https://yzdmusic.github.io/cover-1/ASAP DAN ANGIN (COVER).jpg">
            <div class="card-title">
                <h1>Bayangmu Di Angin Senja</h1>
                <p>Asap Dan Angin Album</p>
            </div>
        </div>
    </div>

    <!-- Sliding Music Player UI -->
    <div class="music-player-ui" id="musicPlayerUI">
        <span class="title-music-player">ASAP DAN ANGIN ALBUM</span>
        <div class="music-header">
            <img id="closePlayer" class="back-btn" src="back-button2.png" alt="Back">
            <span class="more-options">⋮</span>
        </div>
        <img src="cover1.jpg" alt="Album Cover" class="album-cover-large" id="albumCoverLarge">
        <div class="song-info-large">
            <h2 id="songTitleLarge">Green Utopia</h2>
            <p id="artistNameLarge">The Vines</p>
        </div>
        <div class="progress-bar-container">
            <span id="currentTimeLarge">0:00</span>
            <input type="range" id="progressLarge" value="0" max="100">
            <span id="durationLarge">0:00</span>
        </div>
        <div class="controls-large">
            <img id="shuffleLarge" class="control-btn-large" src="arrow.png" alt="Shuffle">
            <img id="prevLarge" class="control-btn-large" src="back-button.png" alt="Previous">
            <img id="playPauseLarge" class="control-btn-large" src="play.png" alt="Play/Pause">
            <img id="nextLarge" class="control-btn-large" src="next-button.png" alt="Next">
            <img id="repeatLarge" class="control-btn-large" src="repeat.png" alt="Repeat">
        </div>
    </div>

    <audio id="audio" src=""></audio>

	<!-- Add here -->
	<link
		rel="Shortcut Icon"
		type="image/png"
		href="YZD LOGO.png"
	>

	<script src="hamburger.js"></script>
    <script src="play-music.js"></script>
    <script src="search-engine-allpages.js"></script>
</body>
</html>
